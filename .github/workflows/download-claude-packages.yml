name: Download Claude Code Offline Packages

on:
  # Manual trigger
  workflow_dispatch:
    inputs:
      force_rebuild:
        description: 'Force rebuild even if version exists'
        required: false
        default: 'true'
      specific_version:
        description: 'Build specific version (e.g., 2.1.79). Leave empty to use latest.'
        required: false
        default: ''
  # Daily check for new versions at 00:00 UTC
  # Weekly full rebuild every Monday at 00:00 UTC
  schedule:
    - cron: '0 0 * * *'   # Daily
    - cron: '0 0 * * 1'   # Weekly (Monday)

env:
  NODE_VERSION: '20'
  NODE_VERSIONS: '18,20,22,25'
  NPM_REGISTRY: 'https://registry.npmmirror.com'

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      latest_version: ${{ steps.check.outputs.latest_version }}
      should_build: ${{ steps.check.outputs.should_build }}
      release_exists: ${{ steps.check.outputs.release_exists }}
    steps:
      - name: Install jq
        run: |
          sudo apt-get update && sudo apt-get install -y jq

      - name: Check latest version from npm
        id: check
        run: |
          set -e
          
          # Check if specific version was requested
          SPECIFIC_VERSION="${{ github.event.inputs.specific_version }}"
          FORCE_REBUILD="${{ github.event.inputs.force_rebuild }}"
          
          if [ -n "$SPECIFIC_VERSION" ]; then
            echo "=== Building specific version: $SPECIFIC_VERSION ==="
            LATEST_VERSION="$SPECIFIC_VERSION"
          else
            echo "=== Checking latest version from npm ==="
            
            # Get latest version from npm
            NPM_RESPONSE=$(curl -s https://registry.npmjs.org/@anthropic-ai/claude-code)
            LATEST_VERSION=$(echo "$NPM_RESPONSE" | jq -r '.["dist-tags"].latest // empty')
            
            if [ -z "$LATEST_VERSION" ] || [ "$LATEST_VERSION" = "null" ]; then
              echo "ERROR: Failed to get version from npm"
              echo "Response: $NPM_RESPONSE"
              exit 1
            fi
            
            echo "Latest npm version: $LATEST_VERSION"
          fi
          
          echo "latest_version=$LATEST_VERSION" >> $GITHUB_OUTPUT
          
          # Check if release already exists
          echo "=== Checking if release exists ==="
          RELEASE_RESPONSE=$(curl -s -w "\n%{http_code}" \
            "https://api.github.com/repos/${{ github.repository }}/releases/tags/v${LATEST_VERSION}")
          
          HTTP_CODE=$(echo "$RELEASE_RESPONSE" | tail -1)
          
          if [ "$HTTP_CODE" = "200" ]; then
            echo "Release v${LATEST_VERSION} already exists"
            echo "release_exists=true" >> $GITHUB_OUTPUT
            
            # Check if force rebuild
            if [ "$FORCE_REBUILD" = "true" ]; then
              echo "Force rebuild requested"
              echo "should_build=true" >> $GITHUB_OUTPUT
            else
              echo "Skipping build - version already exists"
              echo "should_build=false" >> $GITHUB_OUTPUT
            fi
          elif [ "$HTTP_CODE" = "404" ]; then
            echo "Release v${LATEST_VERSION} does not exist"
            echo "release_exists=false" >> $GITHUB_OUTPUT
            echo "should_build=true" >> $GITHUB_OUTPUT
          else
            echo "WARNING: Unexpected HTTP code $HTTP_CODE"
            echo "Assuming release does not exist, proceeding with build"
            echo "release_exists=false" >> $GITHUB_OUTPUT
            echo "should_build=true" >> $GITHUB_OUTPUT
          fi

  build-offline-packages:
    needs: check-version
    runs-on: ubuntu-latest
    if: needs.check-version.outputs.should_build == 'true'
    permissions:
      contents: write
    
    steps:
      - name: Debug outputs
        run: |
          echo "Latest version: ${{ needs.check-version.outputs.latest_version }}"
          echo "Should build: ${{ needs.check-version.outputs.should_build }}"
          echo "Release exists: ${{ needs.check-version.outputs.release_exists }}"

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Configure npm mirrors
        run: |
          # Configure npm to use domestic mirror
          npm config set registry ${{ env.NPM_REGISTRY }}
          
          # Verify configuration
          echo "npm registry configured: $(npm config get registry)"

      - name: Download packages
        run: |
          set -e

          echo "=== Downloading packages as tarballs ==="

          # Create working directory
          mkdir -p claude-offline-packages
          cd claude-offline-packages

          # Download packages as tarballs
          echo "=== Downloading @anthropic-ai/claude-code ==="
          npm pack @anthropic-ai/claude-code --pack-destination .
          CLAUDE_TGZ=$(ls -t anthropic-ai-claude-code-*.tgz 2>/dev/null | head -1 || true)
          # Rename to short name (matching 7z package)
          CLAUDE_VERSION="$(npm view @anthropic-ai/claude-code version)"
          mv "$CLAUDE_TGZ" "claude-code-${CLAUDE_VERSION}.tgz"
          echo "Downloaded: claude-code-${CLAUDE_VERSION}.tgz"

          # Get installed version for release
          echo "CLAUDE_VERSION=$CLAUDE_VERSION" >> $GITHUB_ENV
          echo "Building Claude Code version: $CLAUDE_VERSION"

          # Download platform-specific native binary (linux-x64 by default)
          echo "=== Downloading platform native binary ==="
          npm pack "@anthropic-ai/claude-code-linux-x64@${CLAUDE_VERSION}" --pack-destination .
          NATIVE_TGZ=$(ls -t anthropic-ai-claude-code-linux-x64-*.tgz 2>/dev/null | head -1 || true)
          if [ -n "$NATIVE_TGZ" ]; then
            mv "$NATIVE_TGZ" "claude-code-linux-x64-${CLAUDE_VERSION}.tgz"
            echo "Downloaded: claude-code-linux-x64-${CLAUDE_VERSION}.tgz"
          else
            echo "WARNING: Native binary not available, will use wrapper fallback"
          fi

          # Download optional dependencies that may be needed
          echo "=== Downloading additional dependencies ==="

          # sharp and related packages (commonly needed)
          npm pack @img/sharp-linux-x64 --pack-destination . 2>/dev/null || echo "sharp-linux-x64 not available"
          if ls img-sharp-linux-x64-*.tgz 1>/dev/null 2>&1; then
            SHARP_ORIG=$(ls -t img-sharp-linux-x64-*.tgz 2>/dev/null | head -1 || true)
            SHARP_VER=$(echo "$SHARP_ORIG" | sed 's/img-sharp-linux-x64-//' | sed 's/.tgz//')
            mv "$SHARP_ORIG" "sharp-linux-x64-${SHARP_VER}.tgz"
          fi

          npm pack @img/sharp-libvips-linux-x64 --pack-destination . 2>/dev/null || echo "sharp-libvips-linux-x64 not available"
          if ls img-sharp-libvips-linux-x64-*.tgz 1>/dev/null 2>&1; then
            SHARP_VIPS_ORIG=$(ls -t img-sharp-libvips-linux-x64-*.tgz 2>/dev/null | head -1 || true)
            SHARP_VIPS_VER=$(echo "$SHARP_VIPS_ORIG" | sed 's/img-sharp-libvips-linux-x64-//' | sed 's/.tgz//')
            mv "$SHARP_VIPS_ORIG" "sharp-libvips-linux-x64-${SHARP_VIPS_VER}.tgz"
          fi

          # claude-code-router (useful tool)
          npm pack @musistudio/claude-code-router --pack-destination . 2>/dev/null || echo "claude-code-router not available"
          if ls musistudio-claude-code-router-*.tgz 1>/dev/null 2>&1; then
            ROUTER_ORIG=$(ls -t musistudio-claude-code-router-*.tgz 2>/dev/null | head -1 || true)
            ROUTER_VER=$(echo "$ROUTER_ORIG" | sed 's/musistudio-claude-code-router-//' | sed 's/.tgz//')
            mv "$ROUTER_ORIG" "claude-code-router-${ROUTER_VER}.tgz"
          fi

          echo "=== Downloaded packages (renamed to match 7z format) ==="
          ls -la *.tgz

      - name: Extract packages to node_modules
        run: |
          set -e
          cd "$GITHUB_WORKSPACE/claude-offline-packages"

          echo "=== Extracting packages to node_modules ==="

          # Create node_modules structure
          mkdir -p node_modules/.bin

          # Extract @anthropic-ai/claude-code
          CLAUDE_TGZ=$(ls -t claude-code-*.tgz 2>/dev/null | grep -v router | grep -v linux-x64 | head -1 || true)
          echo "Extracting: $CLAUDE_TGZ to node_modules/@anthropic-ai/claude-code"
          mkdir -p node_modules/@anthropic-ai/claude-code
          tar -xzf "$CLAUDE_TGZ" -C node_modules/@anthropic-ai/claude-code --strip-components=1

          # Extract platform native binary to sibling directory so postinstall can find it
          NATIVE_TGZ=$(ls -t claude-code-linux-x64-*.tgz 2>/dev/null | head -1 || true)
          if [ -n "$NATIVE_TGZ" ]; then
            echo "Extracting: $NATIVE_TGZ to node_modules/@anthropic-ai/claude-code-linux-x64"
            mkdir -p node_modules/@anthropic-ai/claude-code-linux-x64
            tar -xzf "$NATIVE_TGZ" -C node_modules/@anthropic-ai/claude-code-linux-x64 --strip-components=1
          fi

          # Run postinstall to place native binary into bin/claude.exe
          echo "=== Running postinstall to place native binary ==="
          cd node_modules/@anthropic-ai/claude-code
          node install.cjs
          cd "$GITHUB_WORKSPACE/claude-offline-packages"

          # Create .bin symlinks using cli.js (simple and reliable)
          # Native binary detection happens at setup time in setup-claude-code.sh
          echo "=== Creating .bin symlinks ==="
          cd node_modules/.bin
          if [ -f "../@anthropic-ai/claude-code/cli.js" ]; then
            ln -sf ../@anthropic-ai/claude-code/cli.js claude
            chmod +x claude
            echo "Linked cli.js to node_modules/.bin/claude"
          fi
          cd "$GITHUB_WORKSPACE/claude-offline-packages"

          # Verify native binary is available for setup script to use
          if [ -f "node_modules/@anthropic-ai/claude-code/bin/claude.exe" ]; then
            BIN_SIZE=$(stat -c%s "node_modules/@anthropic-ai/claude-code/bin/claude.exe" 2>/dev/null || echo "0")
            if [ "$BIN_SIZE" -gt 100000 ]; then
              echo "Native binary available (${BIN_SIZE} bytes) - setup script will use it if compatible"
            else
              echo "Native binary is stub (${BIN_SIZE} bytes) - setup script will use cli.js fallback"
            fi
          else
            echo "No native binary - setup script will use cli.js"
          fi

          # Extract @musistudio/claude-code-router (if exists)
          if ls claude-code-router-*.tgz 1>/dev/null 2>&1; then
            ROUTER_TGZ=$(ls -t claude-code-router-*.tgz 2>/dev/null | head -1 || true)
            echo "Extracting: $ROUTER_TGZ to node_modules/@musistudio/claude-code-router"
            mkdir -p node_modules/@musistudio/claude-code-router
            tar -xzf "$ROUTER_TGZ" -C node_modules/@musistudio/claude-code-router --strip-components=1
            # Create router symlink
            cd node_modules/.bin
            if [ -f "../@musistudio/claude-code-router/dist/cli.js" ]; then
              ln -sf ../@musistudio/claude-code-router/dist/cli.js ccr
              chmod +x ccr
            fi
            cd "$GITHUB_WORKSPACE/claude-offline-packages"
          fi

          # Extract @img/sharp-linux-x64 (if exists)
          if ls sharp-linux-x64-*.tgz 1>/dev/null 2>&1; then
            SHARP_TGZ=$(ls -t sharp-linux-x64-*.tgz 2>/dev/null | head -1 || true)
            echo "Extracting: $SHARP_TGZ to node_modules/@img/sharp-linux-x64"
            mkdir -p node_modules/@img/sharp-linux-x64
            tar -xzf "$SHARP_TGZ" -C node_modules/@img/sharp-linux-x64 --strip-components=1
          fi

          # Extract @img/sharp-libvips-linux-x64 (if exists)
          if ls sharp-libvips-linux-x64-*.tgz 1>/dev/null 2>&1; then
            SHARP_VIPS_TGZ=$(ls -t sharp-libvips-linux-x64-*.tgz 2>/dev/null | head -1 || true)
            echo "Extracting: $SHARP_VIPS_TGZ to node_modules/@img/sharp-libvips-linux-x64"
            mkdir -p node_modules/@img/sharp-libvips-linux-x64
            tar -xzf "$SHARP_VIPS_TGZ" -C node_modules/@img/sharp-libvips-linux-x64 --strip-components=1
          fi

          # Create package.json (for reference)
          cat > package.json << EOF
          {
            "name": "claude-offline-packages",
            "version": "${CLAUDE_VERSION}",
            "private": true,
            "platform": "linux-x64",
            "dependencies": {
              "@anthropic-ai/claude-code": "file:${CLAUDE_TGZ}"
            }
          }
          EOF

          # Create package-lock.json (empty for compatibility)
          echo '{}' > package-lock.json

          # Create deps-full.json for reference
          echo '{}' > deps-full.json

          echo "=== Final package structure ==="
          ls -la
          echo ""
          echo "=== node_modules structure ==="
          find node_modules -maxdepth 3 -type d | head -30
          echo ""
          echo "=== Verifying claude binary ==="
          ls -la node_modules/.bin/claude 2>/dev/null || echo "claude binary not found"
          echo ""
          echo "=== Native binary status ==="
          file node_modules/@anthropic-ai/claude-code/bin/claude.exe 2>/dev/null || true

      - name: Download VSCode extension
        run: |
          echo "=== Downloading VSCode extension ==="
          cd "$GITHUB_WORKSPACE"
          
          # Method 1: Try OpenVSX (open source VSCode marketplace mirror)
          echo "Trying OpenVSX..."
          curl -L -o claude-offline-packages/anthropic.claude-code.vsix \
            "https://open-vsx.org/api/anthropic/claude-code/latest/file/anthropic.claude-code-latest.vsix" \
            --max-time 60 2>/dev/null || echo "OpenVSX download failed"
          
          # Check if download succeeded
          if [ -f "claude-offline-packages/anthropic.claude-code.vsix" ]; then
            FILE_SIZE=$(stat -c%s "claude-offline-packages/anthropic.claude-code.vsix" 2>/dev/null || echo "0")
            if [ "$FILE_SIZE" -gt 100000 ]; then
              echo "✓ VSCode extension downloaded from OpenVSX (${FILE_SIZE} bytes)"
            else
              echo "! File too small (${FILE_SIZE} bytes), trying alternative..."
              rm -f claude-offline-packages/anthropic.claude-code.vsix
            fi
          fi
          
          # Method 2: Try direct VSCode Marketplace with wget-style request
          if [ ! -f "claude-offline-packages/anthropic.claude-code.vsix" ]; then
            echo "Trying VSCode Marketplace directly..."
            
            # Get latest version first
            VERSION=$(curl -s "https://marketplace.visualstudio.com/items?itemName=anthropic.claude-code" 2>/dev/null | \
              grep -o '"version":"[^"]*"' | head -1 | cut -d'"' -f4 || true)
            
            if [ -n "$VERSION" ]; then
              echo "Found version: $VERSION"
              curl -L -H "User-Agent: Mozilla/5.0" \
                -o claude-offline-packages/anthropic.claude-code.vsix \
                "https://marketplace.visualstudio.com/_apis/public/gallery/publishers/anthropic/vsextensions/claude-code/${VERSION}/vspackage" \
                --max-time 60 2>/dev/null || echo "Marketplace download failed"
            fi
          fi
          
          # Final check
          if [ -f "claude-offline-packages/anthropic.claude-code.vsix" ]; then
            FILE_SIZE=$(stat -c%s "claude-offline-packages/anthropic.claude-code.vsix" 2>/dev/null || echo "0")
            if [ "$FILE_SIZE" -gt 100000 ]; then
              echo "✓ VSCode extension ready (${FILE_SIZE} bytes)"
              ls -lh claude-offline-packages/anthropic.claude-code.vsix
            else
              echo "! Invalid file size (${FILE_SIZE} bytes), removing..."
              rm -f claude-offline-packages/anthropic.claude-code.vsix
            fi
          else
            echo "! Could not download VSCode extension automatically"
            echo "  Install manually: code --install-extension anthropic.claude-code"
          fi
        continue-on-error: true

      - name: Download offline skills and plugins
        run: |
          echo "=== Downloading offline-compatible skills and plugins ==="
          cd "$GITHUB_WORKSPACE"

          # Install jq (required by download-skills.sh)
          sudo apt-get update && sudo apt-get install -y jq

          # Create skills directory
          mkdir -p claude-offline-packages/skills/offline-skills

          # Use the download script which reads from manifest
          # This handles both skills and plugins automatically
          bash skills/download-skills.sh claude-offline-packages/skills/offline-skills

          # Copy install script (manifest is already copied by download-skills.sh)
          cp skills/install-skills.sh claude-offline-packages/skills/
          chmod +x claude-offline-packages/skills/install-skills.sh

          echo "=== Skills and plugins download completed ==="
          echo "Total entries: $(ls -1 claude-offline-packages/skills/offline-skills 2>/dev/null | wc -l)"
          echo ""
          echo "=== Checking for plugins ==="
          ls -la claude-offline-packages/skills/offline-skills/ | grep -E "superpowers|everything-claude-code|oh-my-claudecode" || echo "WARNING: Plugins not found!"
          du -sh claude-offline-packages/skills/

      - name: Copy setup script
        run: |
          echo "=== Copying setup script ==="
          
          # Ensure we're in the correct directory
          cd "$GITHUB_WORKSPACE"
          
          cp setup-claude-code.sh claude-offline-packages/
          chmod +x claude-offline-packages/setup-claude-code.sh
          
          if [ -f "check-update.sh" ]; then
            cp check-update.sh claude-offline-packages/
            chmod +x claude-offline-packages/check-update.sh
          fi
          
          echo "Files in package:"
          ls -la claude-offline-packages/
          
          # Verify VSCode extension is included
          if [ -f "claude-offline-packages/anthropic.claude-code.vsix" ]; then
            echo "✓ VSCode extension included in package"
          else
            echo "! VSCode extension not found in package"
          fi

      - name: Create package info
        run: |
          BUILD_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          CLAUDE_VERSION="${{ env.CLAUDE_VERSION }}"
          
          cat > claude-offline-packages/package-info.json << EOF
          {
            "name": "claude-offline-packages",
            "version": "${CLAUDE_VERSION}",
            "created_at": "${BUILD_DATE}",
            "node_versions_supported": "${{ env.NODE_VERSIONS }}",
            "node_version_min": "18",
            "source": "https://www.npmjs.com/package/@anthropic-ai/claude-code",
            "github_repo": "${{ github.repository }}"
          }
          EOF
          
          echo "=== Package info ==="
          cat claude-offline-packages/package-info.json
          
          # Also create a node-versions.json for the setup script
          cat > claude-offline-packages/node-versions.json << EOF
          {
            "min_version": 18,
            "recommended": 20,
            "supported": [18, 20, 22, 25],
            "lts": [18, 20, 22]
          }
          EOF

      - name: Pack offline packages
        run: |
          echo "=== Packing offline packages ==="
          
          # List all files before packing
          echo "Files to be packed:"
          ls -la claude-offline-packages/
          
          # Check if VSCode extension exists
          if [ -f "claude-offline-packages/anthropic.claude-code.vsix" ]; then
            echo "✓ VSCode extension will be included in the package"
          else
            echo "! Warning: VSCode extension not found"
          fi
          
          tar -czf claude-offline-packages.tar.gz claude-offline-packages/
          
          # Calculate checksum
          sha256sum claude-offline-packages.tar.gz > claude-offline-packages.tar.gz.sha256
          
          # Show package size
          echo "Package size:"
          ls -lh claude-offline-packages.tar.gz
          ls -lh claude-offline-packages.tar.gz.sha256
          
          # Verify archive contents
          echo "=== Verifying archive contents ==="
          echo "Looking for VSCode extension in archive:"
          tar -tzf claude-offline-packages.tar.gz | grep -i "vsix" || echo "! VSCode extension not found in archive"

      - name: Fetch Claude Code changelog
        id: changelog
        continue-on-error: true
        run: |
          set -e
          CLAUDE_VERSION="${{ needs.check-version.outputs.latest_version }}"
          echo "=== Fetching changelog for Claude Code v${CLAUDE_VERSION} ==="

          # Install jq if not available
          which jq || sudo apt-get install -y jq

          # Fetch release notes from anthropics/claude-code GitHub repo
          HTTP_CODE=$(curl -s -w "\n%{http_code}" -o /tmp/changelog_response.json \
            "https://api.github.com/repos/anthropics/claude-code/releases/tags/v${CLAUDE_VERSION}")

          if [ "$HTTP_CODE" = "200" ]; then
            # Extract the release body
            CHANGELOG_BODY=$(jq -r '.body // empty' /tmp/changelog_response.json)

            if [ -n "$CHANGELOG_BODY" ] && [ "$CHANGELOG_BODY" != "null" ] && [ ${#CHANGELOG_BODY} -gt 5 ]; then
              # Save changelog to file for the release body step
              printf '%s' "$CHANGELOG_BODY" > /tmp/changelog_body.md
              echo "has_changelog=true" >> $GITHUB_OUTPUT
              echo "Changelog fetched (${#CHANGELOG_BODY} chars)"
            else
              echo "has_changelog=false" >> $GITHUB_OUTPUT
              echo "Changelog body is empty"
            fi
          else
            echo "has_changelog=false" >> $GITHUB_OUTPUT
            echo "No release found on anthropics/claude-code (HTTP $HTTP_CODE)"
          fi

      - name: Generate release body
        run: |
          CLAUDE_VERSION="${{ needs.check-version.outputs.latest_version }}"
          BUILD_DATE=$(date -u +"%Y-%m-%d %H:%M:%S UTC")
          HAS_CHANGELOG="${{ steps.changelog.outputs.has_changelog }}"

          {
            echo "## Claude Code Offline Package v${CLAUDE_VERSION}"
            echo ""
            echo "**Version:** ${CLAUDE_VERSION}"
            echo "**Node.js:** ${{ env.NODE_VERSION }}"
            echo "**Build Date:** ${BUILD_DATE}"
            echo ""

            # Append changelog if available
            if [ "$HAS_CHANGELOG" = "true" ] && [ -s /tmp/changelog_body.md ]; then
              echo "### What's New in Claude Code v${CLAUDE_VERSION}"
              echo ""
              cat /tmp/changelog_body.md
              echo ""
            fi

            echo "### Downloads"
            echo ""
            echo "| File | Description |"
            echo "|------|-------------|"
            echo "| \`claude-offline-packages.tar.gz\` | Offline installation package |"
            echo "| \`claude-offline-packages.tar.gz.sha256\` | SHA256 checksum |"
            echo ""
            echo "### Quick Start"
            echo ""
            echo '```bash'
            echo "# 1. Download and extract"
            echo "tar -xzf claude-offline-packages.tar.gz"
            echo ""
            echo "# 2. Run installer"
            echo "cd claude-offline-packages"
            echo "bash setup-claude-code.sh"
            echo '```'
            echo ""
            echo "### Verification"
            echo ""
            echo '```bash'
            echo "sha256sum -c claude-offline-packages.tar.gz.sha256"
            echo '```'
            echo ""
            echo "### Features"
            echo ""
            echo "- ✅ Automatic mirror source detection"
            echo "- ✅ Region restriction bypass"
            echo "- ✅ Multi-language support (EN/ZH)"
            echo "- ✅ Universal Node.js installation (supports Node 18, 20, 22, 25+)"
            echo "- ✅ Uninstall support"
            echo "- ✅ Offline .tgz package format for better compatibility"
          } > /tmp/release_body.md

          echo "=== Release body generated ==="
          cat /tmp/release_body.md

      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ needs.check-version.outputs.latest_version }}
          name: Claude Code v${{ needs.check-version.outputs.latest_version }}
          body_path: /tmp/release_body.md
          draft: false
          prerelease: false
          files: |
            claude-offline-packages.tar.gz
            claude-offline-packages.tar.gz.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: claude-offline-packages-v${{ needs.check-version.outputs.latest_version }}
          path: |
            claude-offline-packages.tar.gz
            claude-offline-packages.tar.gz.sha256
          retention-days: 30

  cleanup-old-releases:
    needs: [check-version, build-offline-packages]
    runs-on: ubuntu-latest
    if: always() && needs.check-version.outputs.should_build == 'true'
    permissions:
      contents: write
    steps:
      - name: Cleanup old releases (keep latest 10)
        run: |
          echo "=== Cleaning up old releases (keeping latest 10) ==="
          
          # Get all releases sorted by creation date (newest first), exclude the latest 10
          RELEASES_TO_DELETE=$(curl -s \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ github.repository }}/releases?per_page=100" | \
            jq -r '.[10:] | .[] | select(.tag_name | startswith("v")) | .id' 2>/dev/null)
          
          if [ -z "$RELEASES_TO_DELETE" ]; then
            echo "No old releases to delete (less than 10 releases exist)"
            exit 0
          fi
          
          echo "Releases to delete:"
          echo "$RELEASES_TO_DELETE"
          
          # Delete each old release
          for RELEASE_ID in $RELEASES_TO_DELETE; do
            echo "Deleting release ID: $RELEASE_ID"
            curl -s -X DELETE \
              -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
              -H "Accept: application/vnd.github.v3+json" \
              "https://api.github.com/repos/${{ github.repository }}/releases/$RELEASE_ID"
            
            # Also delete the tag
            TAG_NAME=$(curl -s \
              -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
              -H "Accept: application/vnd.github.v3+json" \
              "https://api.github.com/repos/${{ github.repository }}/releases/$RELEASE_ID" | \
              jq -r '.tag_name' 2>/dev/null)
            if [ -n "$TAG_NAME" ] && [ "$TAG_NAME" != "null" ]; then
              echo "Deleting tag: $TAG_NAME"
              curl -s -X DELETE \
                -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
                -H "Accept: application/vnd.github.v3+json" \
                "https://api.github.com/repos/${{ github.repository }}/git/refs/tags/$TAG_NAME" 2>/dev/null || true
            fi
          done
          
          echo "Cleanup completed"

  notify-no-build:
    needs: check-version
    runs-on: ubuntu-latest
    if: needs.check-version.outputs.should_build == 'false'
    steps:
      - name: Skip notification
        run: |
          echo "Skipping build - version ${{ needs.check-version.outputs.latest_version }} already exists"
          echo "To force rebuild, trigger workflow with 'force_rebuild' set to 'true'"
          echo "To build a specific version, use the 'specific_version' input (e.g., '2.1.79')"
